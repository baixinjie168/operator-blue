    model: "claude-sonnet-4-6"
    args: []
    options:
      prompt_transport: "stdin"
llm_params:
  temperature: 0.7
  max_tokens: 4096
  timeout: 900  # LLM请求超时时间(秒),默认600秒

# 迭代配置
iteration:
  max_iterations: 5

# 线程池配置
thread_pool:
  size: auto

# 模块执行配置
module_execution:
  mode: "sequential"  # 执行模式: "sequential"(顺序执行) 或 "concurrent"(并发执行)

# 测试用例生成配置
test_case_generator:
  count: 10

# 日志配置
logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# 路径配置
paths:
  rules_dir: "./skills"
  workspace_dir: "./workspace"
  skill_dir: "./skills"
  backup_dir: "./skills/backup"
