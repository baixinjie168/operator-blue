# LLM接口配置
llm_interfaces:
  - name: "codex_default"
    type: "cli"
    provider: "codex"
    command: "codex"
    model: "gpt-5.4"
    args: []
    options:
      use_default_args: true

  # OpenAI兼容接口示例
  # - name: "openai_compatible"
  #   type: "interface"
  #   provider: "openai"
  #   base_url: "http://10.91.107.88:3456"
  #   api_key: "sk-3456"
  #   model: "shanghai,MiniMax-M2.5"

  # Claude CLI示例
  # - name: "claude_default"
  #   type: "cli"
  #   provider: "claude"
  #   command: "claude"
  #   model: "claude-sonnet-4"
  #   args: []
  #   options:
  #     prompt_transport: "stdin"
llm_params:
  temperature: 0.7
  max_tokens: 40960
  timeout: 900  # LLM请求超时时间(秒),默认600秒

# 迭代配置
iteration:
  max_iterations: 5

# 线程池配置
thread_pool:
  size: auto

# 模块执行配置
module_execution:
  mode: "concurrent"  # 执行模式: "sequential"(顺序执行) 或 "concurrent"(并发执行)

# 测试用例生成配置
test_case_generator:
  count: 10

# 日志配置
logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# 路径配置
paths:
  rules_dir: "./skills"
  workspace_dir: "./workspace"
  skill_dir: "./skills"
  backup_dir: "./skills/backup"
